name: daily-reports
region: fra

jobs:
  - name: risk-tg-slot8
    kind: SCHEDULED
    github:
      repo: podash/daily_reports
      branch: main
      deploy_on_push: false
    run_command: python main_risk_tg.py --slot 8
    instance_size_slug: basic-xxs
